<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cartas de Conversación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F2EC;
    --cream-dark: #EDE9E0;
    --ink: #1A1714;
    --ink-mid: #4A4540;
    --ink-light: #8C8680;
    --border: rgba(30,25,20,0.13);
    --border-strong: rgba(30,25,20,0.26);
    --accent: #6B5C48;
    --card-bg: #FDFBF8;
  }

  html, body {
    height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 16px) 24px env(safe-area-inset-bottom, 24px);
    padding-top: max(env(safe-area-inset-top), 24px);
    padding-bottom: max(env(safe-area-inset-bottom), 24px);
  }

  /* TOP BAR */
  .topbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 0;
  }
  .topbar-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
  }
  .topbar-counter {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink-light);
    font-variant-numeric: tabular-nums;
  }

  /* PROGRESS */
  .progress-wrap {
    width: 100%;
    height: 1px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* CARD STAGE */
  .card-stage {
    flex: 1;
    width: 100%;
    max-width: 400px;
    position: relative;
    margin: 20px 0;
    cursor: pointer;
  }

  /* Stacked shadows behind */
  .card-bg {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 28px;
  }
  .card-bg.s2 {
    transform: translateY(12px) scale(0.94);
    opacity: 0.5;
  }
  .card-bg.s1 {
    transform: translateY(6px) scale(0.97);
    opacity: 0.75;
  }

  /* Main card */
  .card {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    border: 0.5px solid var(--border-strong);
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 52px 36px 48px;
    will-change: transform, opacity;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Inner frame */
  .card-frame {
    position: absolute;
    inset: 16px;
    border: 0.5px solid var(--border);
    border-radius: 18px;
    pointer-events: none;
  }

  /* Corner ornaments */
  .corners { position: absolute; inset: 16px; pointer-events: none; }
  .corner { position: absolute; width: 18px; height: 18px; }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 0; left: 0; }
  .corner.tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner.br { bottom: 0; right: 0; transform: scale(-1,-1); }

  .dash {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 32px;
    height: 0.5px;
    background: var(--border-strong);
  }
  .dash.top    { top: 30px; }
  .dash.bottom { bottom: 30px; }

  /* Question */
  .card-text {
    font-family: 'Lora', Georgia, serif;
    font-size: clamp(18px, 5vw, 22px);
    font-weight: 600;
    line-height: 1.55;
    text-align: center;
    color: var(--ink);
    position: relative;
    z-index: 1;
  }

  /* Tap hint inside card */
  .tap-hint {
    position: absolute;
    bottom: 44px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-light);
    font-family: 'DM Sans', sans-serif;
    opacity: 0.7;
  }

  /* ANIMATIONS */
  @keyframes swipeLeft {
    0%   { opacity: 1; transform: translateX(0) rotate(0deg); }
    100% { opacity: 0; transform: translateX(-100px) rotate(-6deg); }
  }
  @keyframes comeRight {
    0%   { opacity: 0; transform: translateX(100px) rotate(6deg); }
    100% { opacity: 1; transform: translateX(0) rotate(0deg); }
  }
  .card.out { animation: swipeLeft 0.28s cubic-bezier(0.4,0,1,1) forwards; }
  .card.in  { animation: comeRight 0.28s cubic-bezier(0,0,0.2,1) forwards; }

  /* BOTTOM CONTROLS */
  .bottom {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .btn-main {
    width: 100%;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 100px;
    padding: 18px 36px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-main:active { opacity: 0.7; transform: scale(0.97); }

  .btn-secondary {
    background: transparent;
    color: var(--ink-light);
    border: none;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    letter-spacing: 0.04em;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:active { opacity: 0.5; }

  /* DONE SCREEN */
  .done {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1rem;
    gap: 1rem;
  }
  .done-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--ink);
  }
  .done-sub {
    font-family: 'Lora', Georgia, serif;
    font-size: 16px;
    font-style: italic;
    color: var(--ink-light);
    line-height: 1.7;
  }
</style>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let deck = shuffle(Q);
let idx = 0;
let busy = false;
const total = Q.length;
let hintHidden = false;

function render() {
  document.getElementById('counter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('card-text').textContent = deck[idx];
  document.getElementById('progress').style.width = ((idx + 1) / total * 100) + '%';
}

function nextCard() {
  if (busy) return;
  if (idx >= total - 1) { showDone(); return; }

  // Hide tap hint after first tap
  if (!hintHidden) {
    const hint = document.getElementById('tap-hint');
    if (hint) { hint.style.opacity = '0'; hint.style.transition = 'opacity 0.4s'; }
    hintHidden = true;
  }

  busy = true;
  const card = document.getElementById('card');
  card.classList.add('out');
  setTimeout(() => {
    idx++;
    render();
    card.classList.remove('out');
    card.classList.add('in');
    setTimeout(() => { card.classList.remove('in'); busy = false; }, 280);
  }, 280);
}

function resetDeck() {
  deck = shuffle(Q);
  idx = 0;
  busy = false;
  hintHidden = false;

  document.getElementById('topbar').innerHTML = `
    <span class="topbar-title">Cartas</span>
    <span class="topbar-counter" id="counter"></span>
  `;
  document.getElementById('progwrap').innerHTML = `<div class="progress-fill" id="progress"></div>`;

  document.getElementById('stage').innerHTML = `
    <div class="card-bg s2"></div>
    <div class="card-bg s1"></div>
    <div class="card" id="card">
      <div class="card-frame"></div>
      <div class="corners">
        <div class="corner tl"><svg viewBox="0 0 18 18" fill="none"><path d="M1 17 L1 1 L17 1" stroke="rgba(30,25,20,0.22)" stroke-width="0.9"/></svg></div>
        <div class="corner tr"><svg viewBox="0 0 18 18" fill="none"><path d="M1 17 L1 1 L17 1" stroke="rgba(30,25,20,0.22)" stroke-width="0.9"/></svg></div>
        <div class="corner bl"><svg viewBox="0 0 18 18" fill="none"><path d="M1 17 L1 1 L17 1" stroke="rgba(30,25,20,0.22)" stroke-width="0.9"/></svg></div>
        <div class="corner br"><svg viewBox="0 0 18 18" fill="none"><path d="M1 17 L1 1 L17 1" stroke="rgba(30,25,20,0.22)" stroke-width="0.9"/></svg></div>
      </div>
      <div class="dash top"></div>
      <div class="card-text" id="card-text"></div>
      <div class="dash bottom"></div>
      <span class="tap-hint" id="tap-hint">tocá para avanzar</span>
    </div>
  `;
  document.getElementById('stage').onclick = nextCard;

  document.getElementById('bottom').innerHTML = `
    <button class="btn-main" onclick="nextCard()">Siguiente carta →</button>
    <button class="btn-secondary" onclick="resetDeck()">Barajar de nuevo</button>
  `;

  render();
}

function showDone() {
  document.getElementById('stage').style.display = 'none';
  document.getElementById('bottom').innerHTML = `
    <div style="text-align:center; padding: 1rem 0 0.5rem;">
      <p style="font-family:'Lora',serif; font-size:26px; font-weight:600; color:var(--ink); margin-bottom:0.8rem;">Fin del mazo</p>
      <p style="font-family:'Lora',serif; font-size:15px; font-style:italic; color:var(--ink-light); line-height:1.7; margin-bottom:1.8rem;">Las 243 cartas fueron jugadas.</p>
      <button class="btn-main" onclick="resetDeck(); document.getElementById('stage').style.display='';">Barajar de nuevo</button>
    </div>
  `;
}

// Swipe support
let touchStartX = 0;
document.getElementById('stage').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });
document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 40) nextCard();
}, { passive: true });

render();
</script>
